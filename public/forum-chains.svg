    <linearGradient id="chainInner" x1="-78" y1="0" x2="78" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#76ffaf" />
      <stop offset="0.5" stop-color="#1d4026" />
      <stop offset="1" stop-color="#9dffd2" />
    </linearGradient>
    <filter id="chainGlow" x="-240" y="-180" width="480" height="360" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0
