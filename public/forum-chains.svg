  <defs>
    <linearGradient id="chainBody" x1="0" y1="-42" x2="0" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08160e" />
      <stop offset="0.55" stop-color="#020504" />
      <stop offset="1" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="chainEdge" x1="-104" y1="-40" x2="104" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#55ff94" />
      <stop offset="0.28" stop-color="#9dffbf" />
