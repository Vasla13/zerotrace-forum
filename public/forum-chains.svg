    </filter>
    <symbol id="chain-link" viewBox="-110 -54 220 108">
      <g filter="url(#chainGlow)" opacity="0.62">
        <rect x="-88" y="-28" width="176" height="56" rx="28" stroke="#66ff9e" stroke-width="10" />
      </g>
      <g filter="url(#chainShadow)">
        <rect
          x="-94"
          y="-32"
          width="188"
          height="64"
          rx="32"
          fill="url(#chainBody)"
          stroke="url(#chainEdge)"
          stroke-width="6"
        />
        <rect
          x="-74"
          y="-14"
          width="148"
          height="28"
          rx="14"
          fill="#010202"
          stroke="url(#chainInner)"
          stroke-width="3"
